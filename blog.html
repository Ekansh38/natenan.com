<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blog — natenan.com</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="site-title">natenan.com</a>
    </header>
    <main class="section-page">
        <h1>blog</h1>
        <div class="project-list" id="post-list"></div>
    </main>
    <script>
        fetch('posts.json')
            .then(r => r.json())
            .then(posts => {
                const list = document.getElementById('post-list');
                if (posts.length === 0) {
                    list.innerHTML = '<p class="project-desc">no posts yet.</p>';
                    return;
                }
                list.innerHTML = posts.map((post, i) => `
                    ${i > 0 ? '<hr class="divider">' : ''}
                    <div class="project">
                        <a href="post.html?slug=${post.slug}" class="project-title post-link">${post.title}</a>
                        <p class="project-desc">${post.date}</p>
                    </div>
                `).join('');
            });
    </script>
</body>
</html>
